services:
  api:
    build:
      context: ./app
    container_name: dockvault-api

    ports:
      - "${API_PORT}:5000"

    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - dockvault-network

  db:
    image: postgres:16
    container_name: dockvault-db

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - dockvault-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

    networks:
      - dockvault-network

networks:
  dockvault-network:
    driver: bridge

volumes:
  dockvault-data: